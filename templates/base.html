<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>{% block title %}Personal Finance Tracker{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />

  <!-- App CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
</head>
<body>

  {# Hide navbar on login and forgot pages only #}
  {% set hide_nav = request.endpoint in ['auth_login', 'auth_forgot'] %}
  {% if not hide_nav %}
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="{{ url_for('dashboard') }}">
        <img src="{{ url_for('static', filename='img/logo.png') }}"
     alt="Logo"
     class="nav-logo"
     style="width:85px;height:85px;object-fit:contain;margin-right:8px;">

        <span class="fw-semibold">Personal Finance Tracker</span>
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div id="nav" class="collapse navbar-collapse">
        <ul class="navbar-nav mx-auto">
          <li class="nav-item"><a class="nav-link" href="{{ url_for('dashboard') }}">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('transactions') }}">Transactions</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('reports') }}">Reports</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('recurring') }}">Recurring</a></li>
        </ul>
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="{{ url_for('auth_logout') }}"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
        </ul>
      </div>
    </div>
  </nav>
  {% endif %}

  <!-- Page content -->
  <main class="container my-4">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // highlight current nav link (only when nav is shown)
    document.addEventListener('DOMContentLoaded', () => {
      const here = location.pathname;
      document.querySelectorAll('.navbar .nav-link')?.forEach(a=>{
        if (a.getAttribute('href') === here) a.classList.add('text-primary','fw-semibold','active');
      });
    });
  </script>
</body>
</html>
