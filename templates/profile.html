{% extends "base.html" %}
{% block title %}Your Profile{% endblock %}

{% block content %}

<div class="container" style="max-width: 700px; margin-top: 50px;">

    <h2 class="fw-bold mb-4"><i class="bi bi-person-circle"></i> Your Profile</h2>

    <div class="card shadow-sm p-4" style="border-radius:14px;">
        <h4 class="fw-semibold mb-3">Account Details</h4>

        <p class="mb-1"><strong>Name:</strong> {{ user.name }}</p>
        <p class="mb-1"><strong>Email:</strong> {{ user.email }}</p>

        <hr class="my-4">

        <div class="d-flex flex-column gap-2">
            <a href="{{ url_for('profile_edit') }}" class="btn btn-primary w-100">
                <i class="bi bi-pencil-square"></i> Edit Profile
            </a>

            <a href="{{ url_for('profile_change_password') }}" class="btn btn-outline-secondary w-100">
                <i class="bi bi-shield-lock"></i> Change Password
            </a>
        </div>
    </div>

</div>

{% endblock %}
