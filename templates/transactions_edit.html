{% extends "base.html" %}
{% block title %}Edit Transaction | Personal Finance Tracker{% endblock %}
{% block content %}

<div class="mx-auto" style="max-width: 480px;">
  <div class="card p-4 mt-3">
    <h4 class="fw-semibold mb-3">Edit Transaction</h4>

    <form method="post">

      <!-- Date -->
      <div class="mb-3">
        <label class="form-label">Date</label>
        <input type="date" name="date" class="form-control"
               value="{{ t.date }}" required>
      </div>

      <!-- Description -->
      <div class="mb-3">
        <label class="form-label">Description</label>
        <input type="text" name="description" class="form-control"
               value="{{ t.description }}">
      </div>

      <!-- Type -->
      <div class="mb-3">
        <label class="form-label">Type</label>
        <select name="type" id="type-select" class="form-select" required>
          <option value="Income" {% if t.type == 'Income' %}selected{% endif %}>Income</option>
          <option value="Expense" {% if t.type == 'Expense' %}selected{% endif %}>Expense</option>
        </select>
      </div>

      <!-- Category -->
      <div class="mb-3">
        <label class="form-label">Category</label>
        <select name="category" id="category-select" class="form-select" required>
          <!-- populated by JS -->
        </select>
      </div>

      <!-- Amount -->
      <div class="mb-3">
        <label class="form-label">Amount</label>
        <input type="number" step="0.01" name="amount"
               class="form-control" value="{{ t.amount }}" required>
      </div>

      <div class="d-flex gap-2">
        <button class="btn btn-primary w-100">Update</button>
        <a href="{{ url_for('transactions') }}"
           class="btn btn-outline-secondary w-100">Cancel</a>
      </div>
    </form>
  </div>
</div>

<!-- JS: category switching + preselect -->
<script>
document.addEventListener("DOMContentLoaded", function () {
  const typeSelect = document.getElementById("type-select");
  const categorySelect = document.getElementById("category-select");

  const incomeCategories = {{ income_categories | tojson }};
  const expenseCategories = {{ expense_categories | tojson }};
  const currentCategory = "{{ t.category }}";

  function populateCategories(type, selectedCategory = "") {
    categorySelect.innerHTML = "";

    const source = type === "Income"
      ? incomeCategories
      : expenseCategories;

    source.forEach(cat => {
      const opt = document.createElement("option");
      opt.value = cat;
      opt.textContent = cat;

      if (cat === selectedCategory) {
        opt.selected = true;
      }

      categorySelect.appendChild(opt);
    });
  }

  // initial load
  populateCategories(typeSelect.value, currentCategory);

  // change when type changes
  typeSelect.addEventListener("change", function () {
    populateCategories(this.value);
  });
});
</script>

{% endblock %}
