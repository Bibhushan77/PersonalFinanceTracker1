{% extends "base.html" %}
{% block title %}Forgot Password | Personal Finance Tracker{% endblock %}

{% block content %}
<div class="mx-auto" style="max-width:420px;">
  <div class="card p-4 text-center shadow-sm">

    <h3 class="mb-2">Forgot Password</h3>
    <p class="text-muted">Enter your email to receive a reset link.</p>

    <form method="post">
      <input name="email"
             type="email"
             class="form-control mb-3"
             placeholder="you@example.com"
             required>

      <button class="btn btn-primary w-100">
        Send Reset Link
      </button>
    </form>

    <div class="mt-3">
      <a href="{{ url_for('auth_login') }}" class="text-decoration-none">
        ← Back to Login
      </a>
    </div>

  </div>
</div>
{% endblock %}
