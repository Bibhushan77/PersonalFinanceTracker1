{% extends "base.html" %}
{% block title %}Forgot Password | Personal Finance Tracker{% endblock %}
{% block content %}
<div class="mx-auto" style="max-width:420px;">
  <div class="card p-4 text-center">
    <h3 class="mb-2">Forgot Password</h3>
    <p class="text-muted">Enter your email; we’ll send a reset link (demo).</p>
    <form id="resetForm" method="post">
      <input id="email" name="email" type="email" class="form-control mb-3" placeholder="you@example.com" required>
      <button class="btn btn-primary w-100">Send Reset Link</button>
    </form>
  </div>
</div>
<script>
document.getElementById("resetForm").addEventListener("submit",(e)=>{
  e.preventDefault();
  alert("If an account exists, a reset link was sent (demo).");
  window.location.href="{{ url_for('auth_login') }}";
});
</script>
{% endblock %}
