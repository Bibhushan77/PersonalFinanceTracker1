{% extends "base.html" %}
{% block title %}Edit Profile{% endblock %}

{% block content %}

<div class="container" style="max-width: 650px; margin-top: 50px;">
    
    <h2 class="fw-bold mb-4"><i class="bi bi-pencil-square"></i> Edit Profile</h2>

    <div class="card p-4 shadow-sm" style="border-radius:14px;">

        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold">Full Name</label>
                <input name="name" type="text" class="form-control" value="{{ user.name }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Email</label>
                <input name="email" type="email" class="form-control" value="{{ user.email }}" required>
            </div>

            <button class="btn btn-primary w-100">Save Changes</button>
        </form>

        <a href="{{ url_for('profile') }}" class="btn btn-link mt-3">&larr; Back to Profile</a>

    </div>

</div>

{% endblock %}
